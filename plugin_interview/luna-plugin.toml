name = "plugin-interview"
version = "0.1.1"
description = "Adaptive knowledge-elicitation interviews → structured briefs."
entry = "plugin_interview"
sdk_version = "0"
license = "MIT"
category = "global"
db_tables = ["plugin_interview_sessions", "plugin_interview_topics", "plugin_interview_turns"]
tags = ["interview", "discovery", "briefs"]
readme = """
# plugin-interview

Adaptive **knowledge-elicitation interviews** for Luna. The agent runs a
discovery conversation, the plugin owns the *structure*: a live coverage map,
the transcript, and a publishable markdown brief.

Adds an **Interviews** section to the left sidebar (the work area, not Settings):
list → coverage rings → per-interview detail (domain understanding, coverage map,
transcript, brief with copy/download). Served as a full-pane iframe from the
managed dir.

First plugin to own its **own DB tables via the SDK** (008.5/phase10, enabler E4):
`from luna_sdk import declarative_base, JSONB, UUID` gives it metadata fully
isolated from core. Three tables (`plugin_interview_{sessions,topics,turns}`) are
created on enable via `ctx.engine`. Imports only `luna_sdk` + stdlib + SQLAlchemy.

Source: https://github.com/huemorgan/plugin-interview
"""

